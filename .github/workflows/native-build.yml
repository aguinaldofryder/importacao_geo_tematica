name: Native Build

# Dispara em push para main e em qualquer tag de release.
# NÃO dispara em pull_request — build nativo é lento (~10-12 min com cache quente,
# ~20-25 min sem cache). PRs usam ci.yml (JVM, ./mvnw -B verify).
on:
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  native-build:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      # Permite que um job continue mesmo que o outro falhe — útil para diagnosticar
      # falhas específicas de OS sem perder o resultado do outro runner.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: target/importacao-geo-1.0.0-SNAPSHOT-runner
            artifact: importacao-geo-linux-x64
          - os: windows-latest
            binary: target/importacao-geo-1.0.0-SNAPSHOT-runner.exe
            artifact: importacao-geo-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      # GraalVM CE 21 — mesma distribuição do ambiente de dev local (Story 6.1).
      # cache: 'maven' habilita cache de ~/.m2 nativo do setup-graalvm; não adicionar
      # actions/cache separado para ~/.m2 (conflito de chave).
      # Tempo esperado com cache quente: ~10-12 min por job (AC6).
      - name: Configurar GraalVM CE 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'
          native-image-job-reports: 'true'

      # shell: bash garante comportamento idêntico em Linux e Windows (Git Bash).
      - name: Compilar binário nativo
        shell: bash
        run: ./mvnw package -Pnative -DskipTests -B

      # ── Verificação de tamanho (AC5: binário deve ser ≤ 100 MB / 104857600 bytes) ──

      - name: Verificar tamanho do binário (Linux)
        if: runner.os == 'Linux'
        run: |
          SIZE=$(wc -c < "${{ matrix.binary }}")
          echo "Tamanho: ${SIZE} bytes"
          [ "$SIZE" -le 104857600 ] || { echo "ERRO: binário excede 100 MB (${SIZE} bytes)"; exit 1; }

      - name: Verificar tamanho do binário (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $size = (Get-Item "${{ matrix.binary }}").length
          Write-Host "Tamanho: $size bytes"
          if ($size -gt 104857600) { throw "ERRO: binário excede 100 MB ($size bytes)" }

      # ── Smoke test (AC7: --help deve retornar exit 0) ──────────────────────────────

      - name: Smoke test
        shell: bash
        run: ./${{ matrix.binary }} --help

      # ── Upload do artefato (AC4: retenção de 30 dias) ──────────────────────────────

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          retention-days: 30

  # ── Job E2E — executa a suite e2e.sh contra o binário Linux (AC7 / Story 6.3) ──
  e2e:
    name: E2E (ubuntu-latest)
    needs: native-build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Baixar binário Linux
        uses: actions/download-artifact@v4
        with:
          name: importacao-geo-linux-x64
          path: dist/

      - name: Tornar binário executável
        run: |
          mv dist/importacao-geo-1.0.0-SNAPSHOT-runner dist/importacao-geo-linux-x64
          chmod +x dist/importacao-geo-linux-x64

      - name: Executar suite E2E
        run: bash scripts/e2e.sh dist/importacao-geo-linux-x64

  # ── Job Release — publica GitHub Release em tags v*.*.* (AC1–AC5 / Story 6.6) ──
  release:
    name: GitHub Release
    # Só executa em tags de release — não em push para main.
    if: startsWith(github.ref, 'refs/tags/v')
    # Gating AC2: unit+integration (ci.yml é separado; aqui garantimos native+e2e verdes).
    needs: [native-build, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Necessário para criar a GitHub Release (AC1 Dev Notes)

    steps:
      - uses: actions/checkout@v4

      # Baixar binários produzidos pelos jobs anteriores
      - name: Baixar binário Linux
        uses: actions/download-artifact@v4
        with:
          name: importacao-geo-linux-x64
          path: dist/

      - name: Baixar binário Windows
        uses: actions/download-artifact@v4
        with:
          name: importacao-geo-windows-x64.exe
          path: dist/

      # Renomear binário Windows para nome final esperado (AC3)
      - name: Preparar assets
        shell: bash
        run: |
          mv dist/importacao-geo-1.0.0-SNAPSHOT-runner dist/importacao-geo-linux-x64
          chmod +x dist/importacao-geo-linux-x64
          # O artifact Windows já tem o nome correto importacao-geo-windows-x64.exe
          ls -lh dist/

      # Publicar GitHub Release com os 5 assets obrigatórios (AC3)
      # softprops/action-gh-release lê CHANGELOG.md automaticamente quando
      # body_path não é definido e o arquivo existe (AC4 Dev Notes).
      - name: Publicar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Extrai a seção da versão atual do CHANGELOG.md como release notes (AC4)
          generate_release_notes: false
          body_path: CHANGELOG.md
          # Pre-release para tags com sufixo (ex.: v0.0.1-rc, v1.0.0-beta)
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/importacao-geo-linux-x64
            dist/importacao-geo-windows-x64.exe
            MANUAL.md
            RUNBOOK-DBA.md
            application.properties.exemplo
