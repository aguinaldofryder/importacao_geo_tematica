services:
  db:
    image: postgres:16
    container_name: importacao_geo_db
    environment:
      POSTGRES_DB: ${DB_NAME:-paranacity}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      # Configura search_path para o schema aise (onde ficam as tabelas do domínio)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-paranacity}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
