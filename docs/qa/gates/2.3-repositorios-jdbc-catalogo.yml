nfr_validation:
  security:
    status: PASS
    notes: 'Sem credenciais hardcoded em produção. Senha do PostgreSQLContainer é local de teste e não escapa do escopo do resource (restrictToAnnotatedClass=true). PreparedStatement em todas as queries — sem risco de SQL injection.'
  performance:
    status: PASS
    notes: 'Queries simples sobre 3 tabelas pequenas do catálogo (não-críticas). Container PostgreSQL 16-alpine startup ~1.4s observado. Sem N+1 (cada método é 1 query). Cache deferido corretamente (premature optimization).'
  reliability:
    status: PASS
    notes: 'try-with-resources aninhado em todos os métodos públicos garante release de Connection/PreparedStatement/ResultSet. SQLException sempre encapsulada em ImportacaoException com cause original preservado. listarPorCampo(idInexistente) retorna lista vazia — comportamento defensivo correto e testado (AC11.e). FK aise.campo→aise.grupocampo + aise.alternativa→aise.campo validada no DDL inline.'
  maintainability:
    status: PASS
    notes: 'Javadoc PT em todas as 3 classes documenta: read-only, schema esperado (aise), referências cruzadas a stories consumidoras (3.2, 3.3, 4.5). Constantes SQL_* no topo facilitam grep e revisão. Padrão uniforme entre os 3 repositórios (DRY conceitual sem abstração prematura). Construtor @Inject com final ajuda native-image (Story 6.1).'

top_issues:
  - id: ISSUE-2.3-01
    severity: medium
    status: OPEN
    title: 'AC5 prescreve injeção direta de DataSource, mas implementação usa Instance<DataSource> sem emenda formal do AC'
    description: 'O texto do AC5 (story 2.3 linha 27) ainda lê "injetam javax.sql.DataSource via @jakarta.inject.Inject". A implementação usa Instance<DataSource> (lookup programático) — necessário porque %test.quarkus.datasource.active=false aplicado aos demais @QuarkusTest dispararia InactiveBeanException no lifecycle CDI mesmo sem invocar métodos. O desvio é tecnicamente correto e replicado de cli.ValidarConexaoCommand:46 (mesmo motivo). Está documentado em Change Log v1.1 e em seção dedicada da story. Risco residual: o texto do AC continua "errado", podendo confundir reviewers futuros e métricas de aderência.'
    resolution: 'Sugerido: @sm emenda AC5 para "injetam DataSource via CDI (preferencialmente Instance<DataSource> para tolerar %test.quarkus.datasource.active=false em outros testes)" no momento do *close-story; OR @po aceita formalmente como erratum no fechamento. Não bloqueia gate — semântica observável é equivalente.'
    refs:
      - 'docs/stories/2.3.repositorios-jdbc-catalogo.md:27'
      - 'docs/stories/2.3.repositorios-jdbc-catalogo.md:204-216'
      - 'src/main/java/br/com/arxcode/tematica/geo/catalogo/CampoRepository.java:48-53'
      - 'src/test/java/br/com/arxcode/tematica/geo/cli/PostgresResource.java'

  - id: ISSUE-2.3-02
    severity: low
    status: OPEN
    title: 'CampoRepository.listarTodos() usa try-with-resources em sequência única (assimetria com listarPorFluxo)'
    description: 'Em listarPorFluxo (linha 64-67) o ResultSet é aberto em try-with-resources aninhado dentro do escopo da PreparedStatement — padrão consistente com AlternativaRepository e GrupoCampoRepository. Em listarTodos (linha 88-90) Connection, PreparedStatement e ResultSet são todos no mesmo try. Funciona (close LIFO está correto e não há setX), mas reduz uniformidade interna da classe e do pacote.'
    resolution: 'Refactor trivial: mover ResultSet para try aninhado interno, mantendo simetria com listarPorFluxo. Pode ser feito junto com qualquer story futura que toque o pacote. Não bloqueia gate.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/catalogo/CampoRepository.java:87-99'

  - id: ISSUE-2.3-03
    severity: low
    status: OPEN
    title: 'CatalogoPostgresResource executa seed inteiro como uma única chamada Statement.execute'
    description: 'lerRecurso retorna o conteúdo inteiro do seed-catalogo.sql como String e Statement.execute executa o bloco como um único batch implícito. O driver PostgreSQL aceita múltiplos statements separados por ";" em um único execute, mas o comportamento não é portável e fica frágil se o seed evoluir com mistura de DDL/DML/SELECT ou se outro driver for adotado.'
    resolution: 'Quando o seed crescer ou outro fluxo precisar reusar o pattern, considerar split por ";" + execute por statement, ou adotar Flyway/Liquibase (decisão deferida corretamente em Dev Notes). Não há ação imediata.'
    refs:
      - 'src/test/java/br/com/arxcode/tematica/geo/catalogo/CatalogoPostgresResource.java:69-70'

  - id: ISSUE-2.3-04
    severity: low
    status: OPEN
    title: 'Sem teste para fluxo de erro (SQLException → ImportacaoException) do AC8'
    description: 'AC8 prescreve encapsulamento de SQLException em ImportacaoException com mensagem PT + cause original. Os testes cobrem o caminho feliz e edge case (lista vazia), mas não exercem o branch de exception (ex.: shutdown do container no meio de uma query, ou DataSource indisponível). Cobertura atual é por inspeção visual + invariante de tipo.'
    resolution: 'Sugestão futura: adicionar teste com @Mock DataSource (sem @QuarkusTest) que injeta uma SQLException e verifica (a) o tipo ImportacaoException, (b) presença do nome do método/parâmetro na mensagem, (c) cause preservado. Custo trivial; pode ser parte de uma story de hardening de testes ou da própria Story 3.2 quando consumir o repositório.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/catalogo/CampoRepository.java:74-77'
      - 'src/main/java/br/com/arxcode/tematica/geo/catalogo/AlternativaRepository.java:61-64'
      - 'src/main/java/br/com/arxcode/tematica/geo/catalogo/GrupoCampoRepository.java:61-64'

  - id: ISSUE-2.3-05
    severity: info
    status: INFO
    title: 'GrupoCampoRepositoryTest cobre apenas funcionalidade existente — sem teste explícito para funcionalidade inexistente'
    description: 'AC11.f exige listarPorFuncionalidade("TERRENO") → 1 grupo (coberto). Não há teste explícito para listarPorFuncionalidade("INEXISTENTE") → lista vazia. Implementação trivialmente correta (mesmo pattern de AlternativaRepository.listarPorCampo testado em AC11.e), mas paridade de cobertura defensiva entre os 3 repositórios seria desejável.'
    resolution: 'Adicionar 1 teste assertEmpty para funcionalidade inexistente. Custo trivial, não bloqueia gate.'
    refs:
      - 'src/test/java/br/com/arxcode/tematica/geo/catalogo/GrupoCampoRepositoryTest.java:20-28'

