ddd_clean_architecture:
  status: PASS
  notes: 'Camada catalogo/ é adapter fino (Hexagonal/Clean): consome JDBC e devolve records imutáveis do domínio (dominio/), sem vazar Connection/ResultSet para fora. SRP respeitado (1 repositório por agregado de catálogo). Sem dependências invertidas ou acoplamento com camadas superiores (cli/, mapeamento/). Decisão de manter 3 repositórios separados (vs CatalogoRepository unificado) está alinhada com architecture/arquitetura.md §8 e justificada em Dev Notes. ImportacaoException da camada dominio/excecao mantém o vocabulário de erros centralizado.'

dependent_stories_risk:
  status: LOW
  notes:
    - story: '3.2 (auto-mapeador)'
      risk: 'Baixo — API listarPorFluxo(Fluxo) + listarPorCampo(long) cobre 100% do necessário para casar headers de planilha com campo.descricao.'
    - story: '3.3 (validador de mapeamento)'
      risk: 'Baixo — listarTodos() e listarPorCampo retornam dados suficientes para validar referências cruzadas.'
    - story: '4.5 (comando importar / coerção MULTIPLA_ESCOLHA)'
      risk: 'Baixo — listarPorCampo defensivamente retorna lista vazia (testado AC11.e) em vez de null/exception. Encapsulamento de SQLException impede vazamento de checked exception.'
    - story: '6.1 (native-image hardening)'
      risk: 'Baixo — construtor @Inject com final e ausência de field injection é amigável a GraalVM. Records de domínio já têm DominioReflection. Único item futuro: validar que Instance<DataSource> não exige reflect-config.json adicional (provavelmente já coberto pelo Quarkus Agroal extension).'

