ddd_clean_architecture:
  status: PASS
  notes: 'ValidarCommand é orquestrador puro (Application Service) ainda mais thin que MapearCommand — wiring de 1 adapter de I/O (MapeamentoStore) + 1 service de domínio (MapeamentoValidador). Zero regra de negócio nova: toda a lógica de validação semântica (8 regras de pendência) permanece encapsulada no MapeamentoValidador (Story 3.3) testado isoladamente com 18 testes JUnit puros. Pacote cli/ alinhado com Arquitetura §3 (CLI). Decisão de NÃO injetar DataSource/CampoRepository/AlternativaRepository/ImportacaoConfig/CodigoImovelConfig/ColunasFixasConfig (AC4 — comando puramente offline) é arquitetural: validar deve ser executável em CI sem banco e em ambientes onde o Postgres do município não está exposto (revisão por DBA, code review do mapping.json editado). MapeamentoValidador como `private static final VALIDADOR` (AC10) reflete fielmente a decisão da Story 3.3 de não anotar com @ApplicationScoped (classe stateless thread-safe). Helper agruparPendenciasPorHeader é detalhe de UX (relatório agrupado em vez de flat) corretamente encapsulado no command — strip do prefixo "Coluna ''X'': " elimina duplicação visual sob o cabeçalho `<header>:` e tem defesa em profundidade via chave especial "(sem header)" caso o contrato de emissão da 3.3 mude no futuro.'

