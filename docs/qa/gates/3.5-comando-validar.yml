nfr_validation:
  security:
    status: PASS
    notes: 'NFR-07 não-aplicável diretamente (comando puramente offline AC4 — sem conexão JDBC, sem DataSource injetado, zero risco de vazamento de credencial). MapeamentoIoException da Story 3.1 já emite mensagens PT sem expor caminhos absolutos sensíveis (apenas o do mapping.json fornecido pelo operador via --mapeamento). Sem `e.getMessage()` cru de exceção de banco em nenhum ponto do pipeline. Falha inesperada (catch defensivo) emite "Falha inesperada: <getMessage()>" — risco residual aceitável (ramo prático inalcançável conforme decisão arquitetural; comentário "// Defesa: ..." adicionado em v1.2 explicitando inalcançabilidade).'
  performance:
    status: PASS
    notes: 'NFR-04 (streaming) não-aplicável — ValidarCommand é gate booleano sobre artefato em memória (~poucos KB de JSON). Pipeline 3-etapas com fail-fast: arquivo ausente → exit imediato sem tentar parse; JSON inválido → exit antes da validação semântica. MapeamentoValidador (Story 3.3) é stateless e single-pass sobre as listas de fixas/dinâmicas. MapeamentoValidador como `static final VALIDADOR` (AC10) elimina alocação por invocação — instância única JVM-wide thread-safe.'
  reliability:
    status: PASS
    notes: 'Pipeline 3-etapas com try/catch específicos: (1) Files.exists falha → mensagem PT específica + exit 1; (2) MapeamentoIoException da carga → "Mapeamento inválido: ..." + exit 1 (não exit 2 — categoria FR-16 "mapping inválido" = exit 1); (3) ResultadoValidacao.valido()==false → relatório agrupado por header + exit 1. Exception genérica defensiva → "Falha inesperada: ..." + LOG.error preservando stacktrace. Helper de agrupamento agruparPendenciasPorHeader usa LinkedHashMap preservando ordem emitida pelo MapeamentoValidador (fixas → dinâmicas, Story 3.3 T2). Ramos defensivos `(sem header)` (regex `^Coluna ''([^'']+)'':\s*(.*)$` falha) garantem que nenhuma mensagem se perde mesmo se contrato AC6 da 3.3 mudar no futuro. Aviso #2 (v1.2) eliminou disjunção fraca em deveUsarMappingJsonNoDiretorioCorrenteQuandoOpcaoOmitida — Assumptions.assumeFalse skipa de forma determinística quando ./mapping.json existe no CWD.'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extensivo no ValidarCommand referencia Stories 1.3 (registro em MainCommand), 3.1 (MapeamentoStore.carregar), 3.3 (MapeamentoValidador.validar). Comentários "// Defesa: ..." (adicionados em v1.2) explicitam inalcançabilidade prática dos catches Exception genéricos nas etapas 2 e 3 — facilita auditoria futura. Padrão @Dependent + @Unremovable consistente com ValidarConexaoCommand/MapearCommand. Migração Runnable→Callable<Integer> (AC2) trivial e justificada (necessária para exit codes — FR-16). Reuso integral de MapeamentoStore.carregar (AC11) preserva o contrato single-entry-point para JSON estabelecido na Story 3.1 — zero duplicação de parser. Decisão de não criar fallback ASCII (sugestão @qa #2 declinada) preservada com justificativa: consistência com Stories 1.4/3.4 já em produção; reabrir se surgir bug em terminal Windows legado. Decisão de não adicionar teste unitário do parser (sugestão @qa #1 declinada) preservada com justificativa: parser já exercitado pelos cenários AC13 (h) agrupamento, (f) 1 pendência, (g) 3 pendências distintas — cobertura efetiva equivalente sem custo de classe adicional.'

top_issues:
  - id: ISSUE-3.5-AVISO-01
    severity: low
    status: RESOLVED
    title: 'Catches Exception genéricos nas etapas 2 e 3 sem comentário de inalcançabilidade prática'
    description: 'Aviso @qa: os catches `catch (Exception e)` defensivos nas etapas 2 (parsing) e 3 (validação semântica) do pipeline não documentavam por que são considerados ramos defensivos (não-mapeados pelo contrato). A Story 3.1 (MapeamentoStore.carregar) e a Story 3.3 (MapeamentoValidador.validar) já garantem por contrato as exceções específicas (MapeamentoIoException, ImportacaoException), tornando o catch genérico inalcançável em uso normal. Sem comentário, futuro mantenedor poderia tentar "limpar" o catch e remover proteção legítima.'
    suggested_owner: dev
    resolution: 'RESOLVIDO em v1.2 (commit 8c1d9d3): adicionados comentários "// Defesa: ..." nos 2 catches Exception explicitando que (a) MapeamentoStore só lança MapeamentoIoException por contrato AC11; (b) MapeamentoValidador só lança ImportacaoException em validar(null) por contrato Story 3.3; (c) o catch genérico cobre apenas falhas catastróficas não-mapeadas e preserva stacktrace via LOG.error.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/cli/ValidarCommand.java (etapas 2 e 3 do pipeline em call())'

  - id: ISSUE-3.5-AVISO-02
    severity: medium
    status: RESOLVED
    title: 'Teste deveUsarMappingJsonNoDiretorioCorrenteQuandoOpcaoOmitida tinha disjunção fraca que podia esconder regressão'
    description: 'Aviso @qa: o teste do default ./mapping.json (cenário AC13.c) usava lógica `existiaAntes ? assertX : assertY` — se o arquivo já existisse no CWD durante CI (cenário improvável mas possível em ambiente compartilhado), o teste seguia verde mesmo se o `defaultValue = "./mapping.json"` da @Option fosse acidentalmente removido. Risco de falso-positivo em ambiente não-determinístico.'
    suggested_owner: dev
    resolution: 'RESOLVIDO em v1.2 (commit 8c1d9d3): teste reescrito para usar Assumptions.assumeFalse(Files.exists(Path.of("./mapping.json"))) — agora skipa de forma determinística quando ./mapping.json existe no CWD; quando não existe, asserta exit 1 + mensagem específica que prova que o defaultValue está ativo (sem opção --mapeamento, o command tentou exatamente "./mapping.json"). Verificação: ./mvnw test -Dtest=ValidarCommandTest → Tests run: 8, Failures: 0.'
    refs:
      - 'src/test/java/br/com/arxcode/tematica/geo/cli/ValidarCommandTest.java#deveUsarMappingJsonNoDiretorioCorrenteQuandoOpcaoOmitida'

