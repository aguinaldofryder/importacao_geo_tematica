top_issues:
  - id: ISSUE-2.1-01
    severity: medium
    status: RESOLVED
    title: 'Javadoc de cabecalhos() afirma "lista imutável" mas retornava ArrayList mutável'
    description: 'ExcelSessao.cabecalhos() retornava o field interno (ArrayList) — caller poderia mutar a lista interna por engano. Inconsistência contrato↔implementação.'
    resolution: 'Refactor QA: alterado para retornar List.copyOf(cabecalhos). 10/10 testes do pacote excel verdes pós-refactor (ExcelLeitorTest + ExcelLeitorStreamingTest).'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/excel/ExcelSessao.java:78-80'

  - id: ISSUE-2.1-02
    severity: low
    status: OPEN
    title: 'Mensagem de erro em sheet.openStream() não inclui path do arquivo'
    description: 'ExcelSessao.linhas():104 lança "Falha ao abrir stream de linhas da planilha." sem identificar qual arquivo. Em um pipeline batch processando vários xlsx, dificultaria correlação. Não bloqueante: o cause IOException tipicamente carrega contexto suficiente.'
    resolution: 'Sugestão futura: armazenar o Path como field final em ExcelSessao e incluir nas mensagens de erro. Atrasar para quando aparecer evidência real de necessidade (ex.: Story 4.4 log-erros-estruturado).'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/excel/ExcelSessao.java:99-105'

  - id: ISSUE-2.1-03
    severity: low
    status: OPEN
    title: 'AC5 não testa Path null explicitamente'
    description: 'ExcelLeitor.abrir(Path):46 trata xlsx==null com mensagem "Caminho da planilha não informado.", mas não há teste cobrindo esse branch. Risco prático mínimo (CLI sempre passa Path não-null), mas é cobertura de contrato pública faltante.'
    resolution: 'Adicionar 1 teste assertThrows com null. Custo trivial; não bloqueia gate.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/excel/ExcelLeitor.java:45-47'

  - id: ISSUE-2.1-04
    severity: low
    status: INFO
    title: 'argLine -Xmx256m aplicado globalmente vs. apenas no teste de streaming'
    description: 'POM aplica -Xmx256m a TODAS as execuções Surefire/Failsafe. Hoje passa (heap atual <256m em todos os testes), mas stories futuras com payloads grandes (ex.: 4.x importar com fixtures realistas) podem precisar revisar. Alternativa seria @ForkConfiguration por classe de teste, mas adiciona complexidade. Decisão atual está OK e documentada.'
    resolution: 'Monitorar em stories futuras. Não há ação imediata.'
    refs:
      - 'pom.xml:107'
      - 'pom.xml:126'

