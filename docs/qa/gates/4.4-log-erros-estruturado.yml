nfr_validation:
  security:
    status: PASS
    notes: 'Sanitização de control chars (AC3/AC4/AC13) é defesa em profundidade contra log-injection. Cenário concreto coberto em SmokeLogInjection.vetorMaliciosoNaoQuebraEstrutura: célula com Alt+Enter no Excel (\\n digitado em "observações") + tentativa explícita de forjar [linha 999] codigo=HACK não consegue criar entrada autônoma — escape \\\\n preserva estrutura por linha do .log. Operador municipal abrindo o arquivo em less/Notepad jamais verá uma "linha 999" inexistente. Sanitização aplicada defensivamente em TODOS os campos vindos de input externo (codigoImovel, motivo, coluna, valorOriginal, mensagens de erros agregados, nomePlanilha) — verificado por leitura linha-a-linha do gerar() em LogErros.java:218-265 (cada string interpolada passa por sanitizar). Aspas simples NÃO são escapadas (decisão correta — .log é texto plano de auditoria, não SQL nem JSON; aspas em campo de log não causam injection). Decisão registrada em ISSUE-4.4-01 INFO sem impacto de segurança. Fronteira clara vs. quarkus.log.file.* documentada no Javadoc — LogErros não escreve em System.out nem usa Logger, evitando confusão entre artefato e log operacional.'
  performance:
    status: PASS
    notes: 'Função pura sobre estado in-memory; sem I/O (gerar() retorna String, gravação é responsabilidade da Story 4.5). StringBuilder pré-dimensionado via estimarTamanho() (LogErros.java:215, :284-286) — 256 + 96/128/96 bytes por entrada das 3 listas — adequado para volume típico (NFR-04 limita planilha a 100k linhas; pior caso ~15 MB conforme nota da story). Iteração linear O(n) sobre listas; LinkedHashSet em linhasComFalhaDistintas() O(n) sobre as 3 listas concatenadas. Sanitizar com early return (LogErros.java:309-318): scan linear primeiro; se não há char <0x20, devolve referência original sem alocar (assertSame em SanitizacaoTest comprova) — otimização barata e útil para o caso comum (a grande maioria das células não terá control chars). Sem hot-path identificado. Append(LF) em StringBuilder compilado eficientemente. Sem regex, sem reflection, sem boxing desnecessário (int linhasProcessadas como primitivo).'
  reliability:
    status: PASS
    notes: 'IllegalArgumentException com mensagem PT (defeito de programação) distinta de erro como dado registrado nas listas — separação correta. Records imutáveis (EntradaLinhaPulada/EntradaErroCoercao/EntradaErrosLinha) com List.copyOf em registrarErrosLinha (LogErros.java:190) garantem isolamento contra mutação externa do caller. Validação defensiva em todos os 4 métodos registrarX cobre: linha<1, null, blank, lista vazia, elemento null/blank em erros — testes exaustivos em ValidacaoArgs (14 invocações). gerar() é puro/idempotente sobre estado acumulado (AC11 verificado byte-a-byte) — chamado N vezes sem efeito; orquestrador 4.5 pode chamar gerar() para preview sem afetar log subsequente. Contrato single-thread documentado explicitamente no Javadoc — alinhado a pipeline 4.5 sequencial; sem ConcurrentModificationException pois caller respeita contrato. Stateful é divergência intencional vs. 4.1/4.2/4.3 — log é coleção crescente por natureza; aprovada por @po e mitigada por gerar() puro.'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extensivo: classe com 7 seções (papel no épico 4, divergência arquitetural, sanitização AC3, fronteira vs. quarkus.log.file.*, decisões de formato, story/refs); cada método público com @param/@throws e referência cruzada às Stories 4.1/4.2/4.3 que produzem os dados consumidos. Helper sanitizarParaTeste (LogErros.java:337-344) sinalizado claramente como "Acesso package-private ao helper sanitizar para testes unitários diretos. Não usar em produção." — sugestão INFO @po acatada com fidelidade (~3 LoC). Records internos privados nomeados semanticamente (EntradaLinhaPulada/EntradaErroCoercao/EntradaErrosLinha) — preferíveis a tuplas informais. Constantes nomeadas (LF). Testes organizados em 11 @Nested por tema com nomes descritivos snake_case_underscores em pt — facilita navegação. Sem AssertJ (alinhado a CONVENCOES.md e ao padrão das 4.1/4.2/4.3). 339 LoC em LogErros é razoável para a responsabilidade — distribuídas em ~80 LoC de Javadoc, ~50 LoC de validação/construtor, ~70 LoC de gerar(), ~30 LoC de sanitizar com early return, ~20 LoC de helpers + 3 records. Baixa densidade lógica — código direto e legível.'

top_issues:
  - id: ISSUE-4.4-01
    severity: info
    status: INFO
    title: 'Divergência tipográfica no exemplo literal do AC6 (aspas duplicadas) — implementação seguiu corretamente a regra textual do AC3/AC6'
    description: 'O exemplo literal do AC6 mostra "motivo=''valor ''''abc'''' não é decimal válido''" duplicando aspas ao estilo SQL escape, mas o texto do mesmo AC6 e do AC3 afirmam EXPLICITAMENTE que aspas simples NÃO são escapadas pelo helper sanitizar (apenas control chars < 0x20). O @dev seguiu a regra textual e produziu "motivo=''valor ''abc'' não é decimal válido''" (aspas internas intactas), documentando a divergência em comentário no teste FormatoErroCoercao.exemploExatoAC6. Decisão @qa: ACEITAR a implementação. Justificativas: (a) o .log é texto plano de auditoria, não SQL nem JSON — não há parser que tropece em aspas internas; o operador lê visualmente em less/Notepad; (b) a regra textual é inequívoca — sanitização visa ESTRUTURA POR LINHA (control chars), não escape de quoting; (c) escapar aspas estilo SQL no .log confundiria o operador acostumado a copiar literalmente as mensagens do Coercionador (que produzem "valor ''abc''" como já está); (d) sem impacto de segurança — aspas em campo de log não causam injection (apenas control chars o fariam, e esses estão sanitizados). O exemplo literal do AC6 deveria ser corrigido para refletir a regra; nenhuma alteração funcional necessária.'
    suggested_owner: po
    resolution: 'Em uma futura revisão de stories ou refino do AC6 (não bloqueante): corrigir o exemplo literal para "motivo=''valor ''abc'' não é decimal válido''" (sem aspas duplicadas), mantendo a regra textual "aspas simples não são escapadas" intacta. Alternativamente, anexar nota no Change Log da Story 4.4 indicando que o teste FormatoErroCoercao.exemploExatoAC6 é a fonte de verdade do formato. Sem ação para @dev (implementação já correta).'
    refs:
