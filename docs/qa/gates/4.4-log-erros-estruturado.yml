ddd_clean_architecture:
  status: PASS
  notes: 'Posicionamento canônico: LogErros em geracao/ alinhado com Arquitetura §8 (docs/architecture/arquitetura.md:245 cita LogErros explicitamente em geracao/) e com o padrão estabelecido por Coercionador (4.1), SqlGeradorUpdate (4.2), SqlGeradorUpsert (4.3). LogErros é stateful como divergência arquitetural INTENCIONAL e justificada — log é coleção crescente por natureza, não função pura de unidade independente como as 4.1/4.2/4.3. Mitigado por: (a) gerar() puro/idempotente sobre o estado acumulado; (b) contrato single-thread documentado no Javadoc; (c) records imutáveis para entradas internas; (d) List.copyOf em registrarErrosLinha; (e) sem CDI (public final class sem @ApplicationScoped). SRP: cada método registrarX tem responsabilidade única; gerar() concentra renderização; sanitizar isolado como helper privado; linhasComFalhaDistintas() helper privado para sumário. OCP: API tipada por categoria (4 métodos) força revisão consciente desta classe ao adicionar nova categoria de erro — alinhado com switch exhaustivo de Coercionador. Interface Segregation: 4 métodos público distintos em vez de add(String) genérico — habilita sumário tipado (AC10) e estrutura testável (AC5/AC6/AC7). Dependency Inversion: depende apenas de domínio estável (Fluxo) e JDK (OffsetDateTime, DateTimeFormatter, ArrayList, LinkedHashSet, StringBuilder, Objects). Aderente a CONVENCOES.md (imports absolutos sem wildcard, lowercase package, PT-only, sem System.out, IllegalArgumentException PT em vez de NPE), AGENTS.md (geracao/ com responsabilidade única; .log artefato distinto de quarkus.log.file.* — fronteira documentada explicitamente no Javadoc da classe), Constitution (Quality First — cobertura 100/100; Story-Driven — implementa exatamente os 16 ACs aprovados; Absolute Imports — confirmado por inspeção). Marker class para reflexão native-image NÃO necessária (LogErros é construído programaticamente pelo ImportarCommand em 4.5; não atravessa fronteira Jackson; records internos são privados).'

