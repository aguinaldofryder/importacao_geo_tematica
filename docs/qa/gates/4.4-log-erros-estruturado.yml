status_reason: 'Implementação aderente aos 16 ACs da Story Approved v1.1 (validada por @po Pax score 9.6/10). 50 testes novos em 11 @Nested cobrindo todas as categorias (construtor/validação, sanitização direta via helper package-private, validação de args dos 4 registrarX, cabeçalho exato, formato linha pulada/erro coerção/erros agregados, sumário com contagem distinta, seções omitidas, determinismo de ordem + idempotência, line separator fixo, smoke log-injection). Cobertura JaCoCo de LogErros em 100% instruções e 100% branches (45/45 instruções, 13/13 branches) — excede meta NFR-09 (≥80%) ao máximo. Regressão zero confirmada nas 9 classes baseline 4.1/4.2/4.3 + domínio (Coercionador 100/100, SqlEscape 100, SqlGeradorUpdate 90/85, SqlGeradorUpsert 96/92, ResultadoUpdate 100/100, ResultadoUpsert 100/100, ResultadoCoercao 100/100, LinhaMapeada 100/100, Fluxo 100). Suíte 325 → 375 (+50, 1 skipped esperado, 0 falhas) em ./mvnw -B verify ~31s BUILD SUCCESS. Decisões arquiteturais aprovadas pelo @po implementadas com fidelidade: (a) stateful com gerar() puro/idempotente (AC11 verificado byte-a-byte); (b) API tipada por categoria (4 métodos registrarX) com validação IllegalArgumentException PT defensiva; (c) sanitização defensiva em todos os campos vindos de input externo via helper privado sanitizar(String) com early return idempotente (assertSame quando não há control char); (d) timestamp único no cabeçalho via OffsetDateTime + ISO_OFFSET_DATE_TIME (releitura pragmática NFR-08); (e) line separator fixo "\n" LF — verificado por teste dedicado que assertFalse contains("\r"); (f) construtor sobrecarga package-private LogErros(Fluxo, String, OffsetDateTime) para determinismo de testes (AC15); (g) gerar() → String puro sem I/O. ISSUE-4.1-03 LOW efetivamente fechada — helper sanitizar aplicado em codigoImovel, motivo, coluna, valorOriginal, mensagens de erros agregados e nomePlanilha; smoke SmokeLogInjection.vetorMaliciosoNaoQuebraEstrutura prova contagem estrutural exata (13 \n) com vetor que tenta forjar [linha 999] codigo=HACK — token injetado aparece exatamente uma vez como literal escapado dentro do motivo, jamais como entrada autônoma. Aderente a CONVENCOES.md (imports absolutos sem wildcard, lowercase package, PT-only NFR-01, sem System.out.println, IllegalArgumentException PT em vez de NPE, Logger Quarkus deliberadamente não usado por LogErros ser o sink do artefato .log — fronteira documentada em Javadoc da classe), Constitution (Quality First, Story-Driven, Absolute Imports), AGENTS.md (geracao/ com responsabilidade única, .log artefato distinto de quarkus.log.file.*). Decisão sobre divergência tipográfica AC6 (aspas) registrada e aceita — ver ISSUE-4.4-01 INFO. Pronta para *close-story 4.4.'
