nfr_validation:
  security:
    status: PASS
    notes: 'Foco crítico desta story (CON-03 — sem PreparedStatement). Inspeção linha-por-linha de SqlGeradorUpdate.java: única string SQL hard-coded está na linha 145 (`"UPDATE " + fluxo.tabelaPrincipal() + " SET " + ...`) — começa com UPDATE; nenhuma ocorrência de INSERT em qualquer caminho de código. AC10 implementado como teste programático bloqueante com 8 execuções (@ParameterizedTest @EnumSource × 4 cenários: happy, celulasNulas, aspasNoCodigo, injectionNoCodigo) — não é comentário/documental. Escape de aspas no WHERE: codigoImovel passa por Coercionador.coagir(_, Tipo.TEXTO, _) → coagirTexto → SqlEscape.aspas (refactor T1) — vetores reais cobertos (O''Brien produz O''''Brien; injection 1''; DROP TABLE x; -- produz literal inerte 1''''; DROP TABLE x; -- entre aspas). Aspas em células fixas também escapadas pelo mesmo caminho. Resíduo: comportamento sob standard_conforming_strings=off (não-default) requer prefixo E para escapar backslash; assumido on conforme Dev Notes (registrado como risco arquitetural na Story 4.1, ainda válido). Vetores cobertos.'
  performance:
    status: PASS
    notes: 'Função pura síncrona, sem I/O. Iteração linear O(n) sobre colunasFixas (n ≤ ~20 colunas fixas tipicamente em planilhas IPTU); ArrayList pré-dimensionado em gerar (linha 139: `new ArrayList<>(colunaParaLiteral.size())`); LinkedHashMap pré-alocado para preservar ordem. Concatenação de String com + (linhas 145-147) é compilada em StringBuilder pelo javac — não há otimização adicional necessária para escala IPTU. Nenhum estado mutável compartilhado — instanciável uma vez no orquestrador (Story 4.5) e thread-safe. Sem hot-path identificado. Cobertura desta dimensão é satisfatória.'
  reliability:
    status: PASS
    notes: 'Erro como dado (ResultadoUpdate.falha com lista PT) preserva pipeline (PRD FR-13) — orquestrador da Story 4.5 loga e prossegue com próxima linha. Falhas de coerção de TODAS as células fixas + codigoImovel são acumuladas antes de retornar (não há short-circuit) — permite ao operador corrigir N células em uma única passada. Falha em qualquer célula → abandona o UPDATE inteiro (alinhado a AGENTS.md "Código imobiliário ausente → log de erro, pula a linha inteira" e à decisão de design da story). Validação de args como IllegalArgumentException (defeito de programação, não dado) distinta de ResultadoUpdate.falha (dado ruim) — separação clara de responsabilidades. Records imutáveis (ResultadoUpdate, LinhaMapeada) com cópias defensivas via LinkedHashMap+unmodifiableMap garantem isolamento. SqlGeradorUpdate é função pura sem estado — reproducibilidade absoluta. Caso degenerado (mapeamento vazio) tratado explicitamente com mensagem PT específica.'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extensivo nas 4 classes novas e no método novo de Fluxo: contratos, decisões arquiteturais (função pura sem CDI, Coercionador injetado por parâmetro, ordem determinística via LinkedHashMap, ResultadoUpdate vs Optional<String>, premissa de ordem do Mapeamento explícita, limitação Tipo.TEXTO documentada com referência a Story 4.2.1), referências às Stories que consomem (4.3 UPSERT, 4.5 ImportarCommand) e à Story 4.2.1 futura. Constantes nomeadas com semântica explícita (literal NULL, mensagens PT). Helpers (assertSemInsert, contarStatements) com Javadoc explicativo. Testes organizados em @Nested por AC com nomes descritivos snake_case_underscores em pt — facilita navegação. Sem AssertJ (alinhado a CONVENCOES.md e à Story 4.1). Refactor T1 (SqlEscape extraído) elimina duplicação futura nas Stories 4.3 e fecha ISSUE-4.1-02. Sem dívida técnica detectada além das LOW issues registradas. Tratamento adequado das 3 issues VAL-4.2-* do gate v1.1 da story (LinkedHashMap explícito em fixtures + Javadoc de premissa; teste documental de formato AC9; interpretação T5 Passo 4 com Javadoc).'

top_issues:
  - id: ISSUE-4.2-01
    severity: low
    status: OPEN
    title: 'Mapeamento.colunasFixas() não força LinkedHashMap nem aplica cópia defensiva — premissa de ordem é externa'
    description: 'O Javadoc de SqlGeradorUpdate.gerar (linhas 37-45) documenta corretamente que a ordem das colunas no SET segue Mapeamento.colunasFixas(), e que o caller que construa Mapeamento programaticamente deve usar LinkedHashMap. Os fixtures dos testes desta story já fazem isso (verificado em SqlGeradorUpdateTest:42,54,117,133,152,162,185,200). No caminho real, Jackson produz LinkedHashMap ao desserializar mapping.json (preservando ordem do classificador da Story 2.4). Contudo, Mapeamento.java não força LinkedHashMap nem aplica cópia defensiva — caller que passe HashMap perderia ordem silenciosamente. Risco baixo no curto prazo (não há call-site problemático), mas pendência de hardening da camada de modelo. @dev já registrou nas Completion Notes ("Não mexi em Mapeamento.java — escopo creep evitado"), decisão correta para não inflar a 4.2.'
    suggested_owner: dev
    resolution: 'Em uma futura story de hardening de Mapeamento (recomendado entre 4.5 e 6.1): adicionar cópia defensiva no construtor canônico de Mapeamento envolvendo colunasFixas em Collections.unmodifiableMap(new LinkedHashMap<>(...)) — espelha o padrão de Classificacao.java:51-52 e LinhaMapeada.java:57-62. Atualizar testes em conformidade. Risco de regressão: mínimo (Jackson já produz LinkedHashMap; testes já usam LinkedHashMap explícito).'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/Mapeamento.java'
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpdate.java:37-45'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/LinhaMapeada.java:57-62'

  - id: ISSUE-4.2-02
    severity: low
    status: OPEN
    title: 'Caminho de acumulação de erros (AC9) exercitado apenas documentalmente — cobertura plena difere para Story 4.3'
    description: 'AC9 contrata acumulação de N erros de coerção em uma única passada (mensagens "Coluna ''<header>'': <erro>" e "Código do imóvel: <erro>"). Como SqlGeradorUpdate usa exclusivamente Tipo.TEXTO nesta story (limitação 4.2 → 4.2.1) e TEXTO não falha para entradas non-blank (que é a invariante de LinhaMapeada via codigoImovel não-null/blank), o ramo de acumulação (linhas 117-118 e 130 de SqlGeradorUpdate.java) não é executado em runtime nos testes — JaCoCo reporta 90%/85% justamente por causa desses 3 missed branches. O @dev tratou isso em FormatoMensagemDeErro com testes documentais montando manualmente ResultadoUpdate.falha — válido para detectar mudança acidental no formato, mas não exercita o ramo real. Cobertura plena natural fica para Story 4.3 (UPSERT) que usará DECIMAL/DATA/MULTIPLA_ESCOLHA — tipos que falham. Sem ação imediata; risco baixo.'
    suggested_owner: dev
    resolution: 'Quando Story 4.3 (SqlGeradorUpsert) for revisada: confirmar que o ramo análogo de acumulação está plenamente coberto com Tipo != TEXTO. Opcionalmente, refatorar SqlGeradorUpdate para receber Tipo por coluna (Story 4.2.1 — tipagem completa) e nessa ocasião o ramo de acumulação será exercitado naturalmente. Não justifica iteração isolada na 4.2.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpdate.java:117-118,130'
      - 'src/test/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpdateTest.java:265-290'

  - id: ISSUE-4.2-03
    severity: info
    status: INFO
    title: 'Asserção contarStatements em tentativaInjectionNoCodigo_naoEmiteInsert é heurística simplificada'
    description: 'O método auxiliar contarStatements (SqlGeradorUpdateTest.java:380-385) conta apenas o ";" final do SQL, retornando 1 se sql.endsWith(";") senão 0. O comentário no código admite que ";" dentro de literal escapado não fecha statement no PostgreSQL — então a asserção "exatamente 1 statement" é aproximada. Em conjunto com a asserção sql.startsWith("UPDATE ") da mesma linha 368, o teste é funcionalmente correto (qualquer payload de injection no codigoImovel passa por Coercionador.coagirTexto que escapa aspas, neutralizando ; injetado). Cosmético: uma asserção semântica mais forte poderia usar regex que detecte "INSERT INTO" fora de aspas balanceadas, mas é over-engineering para o escopo. Sem ação.'
    suggested_owner: dev
    resolution: 'Sem ação. Se algum dia houver suspeita de bypass de escape, adicionar teste com parser SQL de verdade (ex.: jsqlparser) — não justifica nesta story.'
    refs:
      - 'src/test/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpdateTest.java:346-385'

  - id: ISSUE-4.2-04
    severity: info
    status: INFO
    title: 'Limitação Tipo.TEXTO em colunas fixas é débito conhecido — Story 4.2.1 prevista'
    description: 'AC7 documenta explicitamente que colunas fixas físicas tipo numeric/date que recebam valores em formato pt-BR ("1.234,56", "31/12/2025") podem falhar no banco se o cast implícito do PostgreSQL não aceitar o formato. Inteiros simples ("42" → "42") funcionam via cast implícito. Mitigação: limitação documentada no Javadoc de SqlGeradorUpdate (linhas 47-53) com referência explícita à Story 4.2.1 futura. Trade-off justificado em Dev Notes (refatoração transversal de Mapeamento.colunasFixas para incluir Tipo afeta 9+ arquivos de produção, 5+ testes, fixture JSON). PRD não exige tipagem completa nesta entrega. Sem ação imediata.'
    suggested_owner: po
    resolution: 'Refinar e priorizar Story 4.2.1 após Stories 4.3/4.4/4.5 entregues — quando o pipeline E2E mostrar quantas linhas reais quebram por cast implícito do PostgreSQL. Pode ser que o impacto em volume real seja desprezível e a story seja desnecessária.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpdate.java:47-53'
      - 'docs/stories/4.2.sql-gerador-update.md:188-189'

waiver:
  active: false

ddd_clean_architecture:
  status: PASS
  notes: 'Posicionamento canônico: LinhaMapeada em mapeamento/ (VO de uma linha já mapeada por header), SqlEscape/ResultadoUpdate/SqlGeradorUpdate em geracao/ (utilitário, VO de retorno e gerador) — alinhado com Arquitetura §8 e com o padrão estabelecido por Coercionador/ResultadoCoercao na Story 4.1. SqlGeradorUpdate é função pura no pacote geracao/ — public final class sem CDI, sem dependências de framework (apenas JDK + br.com.arxcode.tematica.geo.{dominio,mapeamento}). Coercionador é injetado por parâmetro (não por campo final) — desacopla a fábrica do gerador da do coercionador, padrão consistente com Story 4.1 AC8. Records imutáveis (ResultadoUpdate, LinhaMapeada) com construtor canônico que valida invariantes (fail-fast) e cópias defensivas via LinkedHashMap+Collections.unmodifiableMap (espelha Classificacao.java:51-52). SRP: cada classe tem responsabilidade única (SqlEscape escapa aspas; ResultadoUpdate transporta resultado; LinhaMapeada agrupa dados de uma linha; SqlGeradorUpdate gera UPDATE). OCP: SqlGeradorUpdate é fechado para modificação no contrato (Mapeamento, Fluxo, Coercionador estáveis) e aberto para extensão via Story 4.3 (SqlGeradorUpsert paralelo). Interface Segregation: assinatura única gerar(linha, mapeamento, fluxo, coercionador) — sem overloads. Dependency Inversion: depende de Mapeamento e Fluxo (estáveis no domínio), não de fontes voláteis. Aderente a CONVENCOES.md (imports absolutos, lowercase package, PT para usuário, sem System.out, Logger não usado por ser função pura). Marker class para reflexão native-image NÃO necessária (nenhuma das classes novas atravessa fronteira Jackson; LinhaMapeada é construída em código pelo leitor da Story 4.5, não desserializada de JSON; ResultadoUpdate é VO de retorno interno).'

dependent_stories_risk:
  status: LOW
  notes:
    - story: '4.3 (SqlGeradorUpsert)'
      risk: 'Baixo — pode reusar SqlEscape.aspas (refactor T1 já posiciona o utilitário); reusará LinhaMapeada.celulasDinamicas; padrão de função pura + Coercionador injetado por parâmetro está estabelecido. Acumulação de erros (AC9) será plenamente exercitada aqui com Tipo != TEXTO (DECIMAL/DATA/MULTIPLA_ESCOLHA). Sem riscos identificados.'
    - story: '4.4 (LogErros)'
      risk: 'Baixo — ResultadoUpdate.erros() entrega lista imutável de mensagens PT prontas para escrita. Atenção ao ISSUE-4.1-03 ainda em aberto (sanitização de control chars no escritor do .log) — se uma célula contiver \\n ou \\r, a mensagem PT virá multi-linha. Não bloqueante.'
    - story: '4.5 (ImportarCommand)'
      risk: 'Baixo — orquestrador instancia SqlGeradorUpdate uma vez (função pura, thread-safe) e compartilha entre iterações. Coercionador também (já validado na 4.1). Caso degenerado (Linha sem colunas fixas a atualizar) e falha de coerção interrompem processamento da linha (PRD FR-13) sem abortar pipeline. Verificar: contagem de linhas com erro deve ser exibida no resumo final. Premissa: Mapeamento real vem do mapping.json desserializado por Jackson (LinkedHashMap) — ordem determinística garantida. ISSUE-4.2-01 só seria relevante se algum dia o Mapeamento for construído programaticamente fora de Jackson.'
    - story: '4.2.1 (tipagem completa de colunas fixas — futura)'
      risk: 'Médio — depende de definição da fonte autoritativa do tipo (catálogo PostgreSQL via information_schema.columns vs. config manual no .json). Refatoração transversal em Mapeamento.colunasFixas para incluir Tipo afeta 9+ arquivos de produção, 5+ testes, fixture JSON. SqlGeradorUpdate precisará receber/derivar Tipo por coluna. ISSUE-4.2-04 documenta o débito.'
    - story: '6.1 (native-image hardening)'
      risk: 'Baixo — nenhuma das 4 classes novas usa reflexão; nenhuma é (de)serializada por Jackson. Não precisam entrar em reflect-config.json (não tocado nesta story, conforme planejado). LinkedHashMap + Collections.unmodifiableMap são suportados nativamente em GraalVM Java 21. Coercionador (regressão zero) já validado na 4.1.'

