story: '3.1'
story_title: 'MapeamentoStore (Jackson JSON I/O do mapping.json)'
gate: PASS
status_reason: 'Implementação completa e bem-feita dos 11 ACs em uma story de fronteira de I/O. 21 testes novos (4 classes) cobrem round-trip, todos os 5 cenários de erro de carregamento (incluindo enum inválido com extração de path/valor) e a política @JsonInclude(NON_NULL) em ambas as variantes MAPEADO/PENDENTE. Fixture canônica idêntica ao exemplo da Arquitetura §5 e validada por comparação semântica via JsonNode.equals. O 6º catch ValueInstantiationException — adicionado após teste falho durante a implementação — está corretamente documentado nas Completion Notes; demonstra rigor (descoberta empírica vs. especulação). Padrão de marker class MapeamentoReflection consistente com DominioReflection da Story 2.2. Aderente a CONVENCOES.md (imports absolutos, PT, logger JBoss), AGENTS.md (pacote mapeamento/ como I/O puro), DDD/Clean (validação semântica delegada à Story 3.3 = single responsibility). 36/36 testes do pacote verdes em rerun (./mvnw -B test -Dtest=mapeamento.*Test).'
