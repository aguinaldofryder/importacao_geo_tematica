nfr_validation:
  security:
    status: PASS
    notes: 'NFR-07 verificado explicitamente em MapearCommandFalhaConexaoTest: nem a senha real do container (S3cr3t!Pass#99) nem a senha injetada (senha-errada-1234) aparecem no stderr; apenas a mensagem PT mapeada por ValidarConexaoCommand.mensagemAmigavel. Reuso correto do catálogo PT de SQLState evita drift. Path de --saida vem do CLI (não de entrada externa não confiável); zero injeção SQL possível (queries são read-only paramétricas no CampoRepository/AlternativaRepository). Credenciais não logadas em INFO/ERROR.'
  performance:
    status: PASS
    notes: 'NFR-04 (streaming) respeitado: ExcelSessao.linhas() consumido em UMA varredura (forEach), com acumulação seletiva apenas para headers MULTIPLA_ESCOLHA detectados. AC13 (skippable second-pass) implementado corretamente — quando catálogo do fluxo não tem MULTIPLA_ESCOLHA, retorna Map.of() sem varrer. LinkedHashSet O(1) para teste de duplicidade preservando ordem de inserção (determinismo do JSON). Catálogo carregado uma vez (~50-200 campos) — sem N+1.'
  reliability:
    status: PASS
    notes: 'Pipeline 6-etapas com try/catch específicos: cada falha mapeada para mensagem PT distinta + exit 1. Conexão validada fail-fast antes de abrir planilha (~2-5s economizados em falhas de credencial). Catálogo vazio detectado e bloqueado com mensagem específica. ImportacaoException (ExcelLeitor) capturada separadamente de Exception genérica. Logger.error preserva stacktrace para diagnóstico DBA. ExcelSessao usado em try-with-resources.'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extensivo no MapearCommand documenta as 6 etapas + referências cruzadas às Stories 1.4/2.1/2.3/2.4/3.1/3.2. CodigoImovelConfig com docstring justificando default MATRICULA + decisão de paralelo a ColunasFixasConfig (vs. inflar ImportacaoConfig). Padrão @Dependent + @Unremovable consistente com ValidarConexaoCommand. FluxoConverter como inner class é localizado e testável. Helper normalizar() duplicado tem comentário explicando por que duplicação é aceita por ora (evitar refactor da 3.2 fechada). Adições não-previstas (FluxoConverter, arquivos separados por profile, Instance<DataSource>, schema aise no PostgresResource) documentadas em Completion Notes com rationale claro.'

top_issues:
  - id: ISSUE-3.4-01
    severity: low
    status: OPEN
    title: 'Cobertura JaCoCo de CodigoImovelConfig em 39% — ramos predial(), por(null), isBlank() não testados'
    description: 'Os defaults declaram comportamentos que não são exercitados por nenhum teste dedicado: (a) ramo predial() (apenas territorial é usado pelo MapearCommandTest fluxo TERRITORIAL); (b) guard `if (fluxo == null)` em por(); (c) ramo `filter(s -> !s.isBlank())` quando a propriedade está em branco; (d) cenário com override da propriedade (testar resolução real do ConfigMapping). A interface é trivial mas é parte do contrato externo (FR-03) e tem 4 ramos não cobertos. Risco residual baixo (defaults são MATRICULA hard-coded em 2 lugares — drift improvável), mas deixa lacuna de regressão.'
    suggested_owner: dev
    resolution: 'Criar CodigoImovelConfigTest análogo ao ColunasFixasConfigOverrideTest existente (~30 linhas): 4 testes — default ausente, override territorial, override predial, override em branco aplicando default; mais um teste unitário do guard `por(null)` direto na interface (instanciar via SmallRyeConfigBuilder ou usar @QuarkusTest). Pode ser feito em housekeeping junto da 3.5/4.5.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/config/CodigoImovelConfig.java:50-72'

  - id: ISSUE-3.4-02
    severity: low
    status: OPEN
    title: 'Helper normalizar() duplicado em 3 lugares (AutoMapeador, ClassificadorColunas, MapearCommand) — drift latente'
    description: 'AC13 reconheceu o trade-off mas a duplicação aumentou de 2 para 3 cópias. Hoje as 3 implementações são equivalentes (strip + lower com flags da ImportacaoConfig.Mapeamento), mas qualquer evolução (ex.: NFD-normalize para acentos, regex de espaços múltiplos) exigirá tocar 3 arquivos com risco de drift silencioso (causaria desalinhamento de match entre Fase 1, Fase 2 e DISTINCT). Justificativa documentada (não tocar Story 3.2 Done) é razoável; debt explícito.'
    suggested_owner: dev
    resolution: 'Extrair NormalizadorTextual (record imutável ou utility class final) em br.com.arxcode.tematica.geo.mapeamento, com único método estático ou método de instância por configuração. AutoMapeador, ClassificadorColunas e MapearCommand passam a delegar. Refactor pode entrar como item técnico da Story 4.5/6.1 (hardening nativo) ou story dedicada de housekeeping.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/cli/MapearCommand.java:305-311'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/AutoMapeador.java'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/ClassificadorColunas.java'

  - id: ISSUE-3.4-03
    severity: low
    status: OPEN
    title: 'Etapa (3) emite e.getMessage() cru ao falhar consultando catálogo — risco residual NFR-07'
    description: 'MapearCommand.call linhas 182-184: `err.println("✗ Falha ao carregar catálogo: " + e.getMessage())`. Para SQLException disparada pelo CampoRepository, e.getMessage() do PostgreSQL é geralmente seguro (não inclui credenciais), mas, em cenários extremos (driver legado ou wrappers customizados), poderia incluir partes do JDBC URL. AC7 prescreve uso exclusivo de mensagemAmigavel para falhas relacionadas a conexão; aqui é falha de QUERY, não de conexão (já validada na etapa 1). Risco prático baixo, mas inconsistente com o tratamento da etapa 1.'
    suggested_owner: dev
    resolution: 'Substituir e.getMessage() por mensagem genérica + log do throwable: `err.println("✗ Falha ao carregar catálogo: consulte o log para detalhes.")` mantendo `LOG.error("Falha ao consultar catálogo", e)` que já está presente. Stacktrace fica disponível em ./saida/importacao-geo.log (FR-16) sem expor à CLI. Ajuste de 1 linha.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/cli/MapearCommand.java:182-184'

  - id: ISSUE-3.4-04
    severity: info
    status: INFO
    title: 'Acumulação DISTINCT só ativa quando match Campo é único (size == 1) — comportamento implícito não documentado em AC'
    description: 'MapearCommand.acumularDistintos linhas 271-274 inclui o header em headersMultiplaEscolha apenas se `matches.size() == 1 && tipo == MULTIPLA_ESCOLHA`. Se houver homonímia no catálogo (dois Campo com mesma descrição, um TEXTO outro MULTIPLA_ESCOLHA — caso raro mas possível), o header é silenciosamente excluído da varredura DISTINCT. AutoMapeador (Story 3.2) trata homonímia como AMBIGUO (status PENDENTE), mas a interação entre a decisão de skip do DISTINCT e o resultado final do auto-mapeamento não é testada. Comportamento atual está OK (se ambíguo o item já vai para PENDENTE — não precisa de DISTINCT), mas merece um teste explícito que documente esse fluxo.'
    suggested_owner: dev
    resolution: 'Opcional — adicionar teste E2E em MapearCommandTest com cenário: catálogo com 2 campos descricao=TIPO_MURO (um MULTIPLA_ESCOLHA, um TEXTO) + planilha com header TIPO_MURO. Verificar que ColunaDinamica resultante tem status PENDENTE e que acumulação foi pulada (sem custo de varredura).'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/cli/MapearCommand.java:271-274'

