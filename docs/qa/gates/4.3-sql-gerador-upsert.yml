nfr_validation:
  security:
    status: PASS
    notes: 'CON-03 cumprido por delegação transparente — SqlGeradorUpsert NÃO escapa diretamente (zero código de escape próprio); referencia passa por coercionador.coagir(_, Tipo.TEXTO, null) → coagirTexto:95 → SqlEscape.aspas (cadeia já blindada pela Story 4.1/4.2). Vetores reais cobertos: O''Brien produz ''O''''Brien'' em DELETE+INSERT (EscapeReferencia.codigoComAspaSimples_escapaNoDeleteEInsert); injection "1''; DROP TABLE x; --" vira literal inerte ''1''''; DROP TABLE x; --'' (EscapeInjection.injectionNaReferencia_viraLiteralInerte) — DROP TABLE jamais executável (entre aspas, com '' interno duplicado, ; já dentro do literal). Valores TEXTO de células também escapados: x''y → ''x''''y'' (EscapeInjection.valorTextoComAspas_escapaNoInsert). DECIMAL/DATA/MULTIPLA_ESCOLHA serializados pelo Coercionador: DECIMAL via BigDecimal.toPlainString (não interpolável de string externa), DATA via LocalDate parseada (não-string), MULTIPLA_ESCOLHA via id Integer mapeado por alternativas (não-string). Aspas externas em DECIMAL/DATA do helper serializarValor são literais hardcoded no código fonte, não influenciáveis pela entrada. Sem regressão da blindagem CON-03 estabelecida pela 4.2.'
  performance:
    status: PASS
    notes: 'Função pura síncrona, sem I/O. Iteração linear O(n) sobre colunasDinamicas (n ≤ ~30 colunas dinâmicas tipicamente em planilhas IPTU); ArrayList sem pré-dimensionamento (linha 118-119: new ArrayList<>()) — leve subótimo cosmético, cresce O(log n) com array doubling, irrelevante para n<100. Concatenação de String com + nas linhas 163-173 compilada em StringBuilder pelo javac — adequado. Pipeline DATA: 1 substring + 1 LocalDate.parse + 1 format por célula DATA — O(1) constante, irrelevante para volume IPTU. Nenhum estado mutável compartilhado — instanciável uma vez no orquestrador (Story 4.5) e thread-safe. Sem hot-path identificado.'
  reliability:
    status: PASS
    notes: 'Erro como dado (ResultadoUpsert.falha com lista PT) preserva pipeline (PRD FR-13). Acumulação plena de falhas antes de retornar (laço completo coleta todas as falhas — não há short-circuit) — permite ao operador corrigir N células em uma única passada na planilha. Falha em qualquer célula dinâmica → abandona TODOS os UPSERTs da linha (alinhado a AGENTS.md "Código imobiliário ausente → log de erro, pula a linha inteira"). Validação de args como IllegalArgumentException (defeito de programação) distinta de ResultadoUpsert.falha (dado ruim) — separação clara. Records imutáveis com List.copyOf garantem isolamento. SqlGeradorUpsert é função pura sem estado — reproducibilidade absoluta. Caso degenerado (mapeamento sem dinâmicas) tratado como sucesso(empty) — divergência intencional vs. 4.2 documentada no Javadoc com referência cruzada. Pipeline DATA ISO → BR robusto: substring(6,16) é seguro porque coagirData:128 sempre devolve "DATE ''<10 chars ISO>''" (17 chars total quando ok); ParseException teórico não pode ocorrer porque Coercionador já valida (contrato AC4).'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extenso nas 2 classes novas e no método novo de Fluxo (sequenceRespostas): contratos, decisões arquiteturais (função pura sem CDI, Coercionador injetado por parâmetro, divergência intencional vs. 4.2 em 3 pontos — caso degenerado, célula vazia, formato DATA), referências cruzadas explícitas a ResultadoUpdate/SqlGeradorUpdate/Coercionador e à Story 4.5 que orquestra. Pipeline DATA ISO → BR documentado linha-a-linha em AC11(c) da story e em comentário de bloco no helper serializarValor. Sub-record privado ValorSerializado isola par (valor, idAlternativa) com nomes semânticos — preferível a tupla informal (Map.Entry) ou retorno de String[]. Magic numbers da substring(6, 16) documentados em comentário inline ("DATE ''YYYY-MM-DD''" 17 chars). Helper privado mantém API pública limpa (apenas gerar()). Constantes nomeadas (DATA_BR DateTimeFormatter estático). Testes organizados em @Nested por tema com nomes descritivos snake_case_underscores em pt — facilita navegação. Sem AssertJ (alinhado a CONVENCOES.md). Duplicação evitável com 4.2: praticamente nula — VOs distintos por necessidade (List<String> vs String), gerador distinto por padrão de SQL distinto (UPDATE single vs DELETE+INSERT múltiplo), helpers internos não compartilhados intencionalmente.'

top_issues:
  - id: ISSUE-4.3-01
    severity: low
    status: OPEN
    title: 'Branch L128 (codigoImovel falha de coerção) defensivo e inalcançável em runtime — não há teste documental'
    description: 'A linha 128 de SqlGeradorUpsert.java acumula "Código do imóvel: " + rcRef.erro() quando coercionador.coagir(linha.codigoImovel(), Tipo.TEXTO, null) falha. Como (a) Coercionador.coagirTexto só falha para entrada null/blank e (b) LinhaMapeada já valida codigoImovel non-null/non-blank no construtor canônico (LinhaMapeada.java), esse ramo é inalcançável em runtime real — defesa em profundidade. JaCoCo reporta como missed (1 das 2 linhas missed em SqlGeradorUpsert). A self-report do @dev nas Completion Notes/File List menciona "2 missed em ramos defensivos default switch" — incorreto: não há default em switch (todos os 4 valores de Tipo são cobertos exaustivamente pelo switch expression switch sem default na linha 204-216). Risco baixo: comportamento correto, apenas não exercitado pelos testes. Cobertura geral 96%/92% mantém-se acima da meta NFR-09 80% com folga.'
    suggested_owner: dev
    resolution: 'Em uma futura passada de hardening (story de polimento ou junto à 4.5): adicionar teste documental análogo a FormatoMensagemDeErro da Story 4.2 que monte manualmente a chamada com um codigoImovel forçando falha (via mock/spy do Coercionador, ou refatorando Coercionador para receber via composição) — não justifica iteração isolada. Alternativa: aceitar como ramo defensivo permanentemente não-coberto e atualizar o comentário da story.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpsert.java:121-129'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/LinhaMapeada.java'

  - id: ISSUE-4.3-02
    severity: low
    status: OPEN
    title: 'Branch L157 (continue após acumulação prévia) exercitável mas não coberto — auto-relato impreciso'
    description: 'A linha 157 de SqlGeradorUpsert.java contém "continue;" dentro do bloco "if (!erros.isEmpty()) {" (linha 156) — atingido quando uma célula anterior falhou coerção mas a célula atual passou (não geramos SQL para linha que terminará em falha). O teste erroEmUmaCelula_naoEmiteSqlParaAsValidasDaMesmaLinha tem fixture "OK_TEXTO" + "RUIM_DECIMAL" nessa ordem: quando RUIM_DECIMAL processa, OK_TEXTO já gerou SQL (sqls não-vazio, erros ainda vazio); quando RUIM_DECIMAL falha, erros recebe entrada e o laço termina. O ramo L157 só seria atingido se a ordem fosse RUIM_DECIMAL primeiro e OK_TEXTO depois — não exercitado. Auto-relato do @dev nas Completion Notes diz "2 missed em ramos defensivos default switch" — INCORRETO: este ramo é exercitável com simples reordenação no LinkedHashMap (RUIM antes, OK depois). Risco baixo: comportamento correto (verificado por inspeção), apenas falta caso de teste.'
    suggested_owner: dev
    resolution: 'Adicionar 1 teste em AcumulacaoDeErros: erroEmCelulaInicial_naoEmiteSqlParaCelulaSeguinteValida — fixture "RUIM_DECIMAL"="abc" depois "OK_TEXTO"="valido"; assertFalse(r.ok()), assertEquals(List.of(), r.sqls()), assertEquals(1, r.erros().size()). Eleva cobertura para ~98%/96%. Custo: ~10 LoC. Prioridade baixa — pode ser feito em janela de oportunidade (junto à 4.4 ou 4.5).'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpsert.java:154-158'
      - 'src/test/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpsertTest.java:379-396'

  - id: ISSUE-4.3-03
    severity: info
    status: INFO
    title: 'Pipeline DATA ISO → BR usa magic numbers substring(6, 16) — fragil a mudanças no contrato do Coercionador'
    description: 'serializarValor para Tipo.DATA executa literal.substring(6, 16) para extrair os 10 chars ISO de "DATE ''YYYY-MM-DD''" (17 chars). Comentário inline na linha 208 documenta que rc.literalSql() = "DATE ''YYYY-MM-DD''" (17 chars). Acoplamento implícito ao contrato exato de Coercionador.coagirData:128 — qualquer mudança lá (ex.: timestamp com hora "DATE ''YYYY-MM-DD HH:MM:SS''", ou prefixo TIMESTAMP) quebra esse helper silenciosamente. Mitigação atual: testes FormaSqlPorTipo asseguram saída ''15/01/2024'' exata e CoercionadorTest.java:151-155,281 asseguram formato "DATE ''YYYY-MM-DD''" — qualquer regressão dispararia teste em ambos os lados. Alternativa mais robusta: usar regex ou parsing tolerante (ex.: strip prefix "DATE ''" e suffix "''", parse central) — over-engineering para invariante atual. Sem ação.'
    suggested_owner: dev
    resolution: 'Sem ação. Se o contrato do Coercionador.coagirData mudar (ex.: Story de timestamps), refatorar serializarValor em conjunto. Os 2 testes de regressão (FormaSqlPorTipo e CoercionadorTest) garantem detecção precoce.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/SqlGeradorUpsert.java:207-214'
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/Coercionador.java:128'

  - id: ISSUE-4.2-01
    severity: low
    status: OPEN
    title: 'Mapeamento.colunasFixas/colunasDinamicas não força LinkedHashMap nem aplica cópia defensiva — premissa de ordem é externa'
    description: 'Pendência herdada da Story 4.2 (gate v1.1). Mantida como OPEN: a Story 4.3 reusa LinkedHashMap explícito em fixtures (verificado em SqlGeradorUpsertTest.java:38-48,105-130,etc.) seguindo a mesma mitigação da 4.2. No caminho real, Jackson produz LinkedHashMap ao desserializar mapping.json. Sem regressão, sem novo escopo nesta story.'
    suggested_owner: dev
    resolution: 'Inalterada — em uma futura story de hardening de Mapeamento (recomendado entre 4.5 e 6.1): adicionar cópia defensiva no construtor canônico de Mapeamento envolvendo colunasFixas/colunasDinamicas em Collections.unmodifiableMap(new LinkedHashMap<>(...)). Espelha o padrão de Classificacao.java:51-52 e LinhaMapeada.java:57-62.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/Mapeamento.java'
      - 'docs/qa/gates/4.2-sql-gerador-update.yml#ISSUE-4.2-01'

