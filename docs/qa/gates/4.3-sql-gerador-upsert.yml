history:
  - date: '2026-05-03T11:08:00-03:00'
    gate: PASS
    score: 92
    note: 'Review único. AC1–AC16 verdes. 40 testes novos (ResultadoUpsert 13 + SqlGeradorUpsert 25 + FluxoTest +2) cobrem todos os ACs incluindo paramétricos @EnumSource(Fluxo.class) em CasosDegenerados e SmokeFormatoNaoRegressao. Cobertura JaCoCo confirmada: SqlGeradorUpsert 96%/92% (≥80% NFR-09 com folga); ResultadoUpsert 100%/100%; ValorSerializado 100%; Fluxo 100% (mantido); Coercionador 100%/100% (regressão zero — Story 4.1 não tocada, contrato ISO preservado para uso da 4.2); SqlGeradorUpdate 90%/85% (Story 4.2 sem regressão). Suíte total 325/325 verde em ./mvnw -B verify. Pipeline DATA ISO → BR (AC11(c)) implementado conforme refino v2.5: literal.substring(6,16) → LocalDate.parse(ISO_LOCAL_DATE) → format(ofPattern("dd/MM/uuuu")) → envelope aspas. Round-trip ISO/BR convergindo para saída BR coberto explicitamente (data_isoNaEntrada_geraSaidaBR + data_brNaEntrada_geraMesmaSaidaBR). Sintaxe DELETE+INSERT correta (sem UNIQUE INDEX em (referencia, idcampo); ON CONFLICT lançaria erro PG); schema "aise." prependido em DELETE FROM, INSERT INTO e nextval; coluna única "valor"; idalternativa NULL exceto MULTIPLA_ESCOLHA; valor='''' literal para MULTIPLA_ESCOLHA. Segurança CON-03 verificada por delegação transparente: O''Brien e injection inertes em DELETE+INSERT. Política AC5/AC9 implementada: laço completo coleta todas as falhas; ISSUE-4.2-02 LOW efetivamente fechada (AcumulacaoDeErros força DECIMAL+DATA inválidos com 2 mensagens reais). Fluxo.sequenceRespostas (AC16) entregue dentro da story. 4 issues registradas: 2 LOW novas (ISSUE-4.3-01 ramo defensivo L128 inalcançável; ISSUE-4.3-02 ramo L157 exercitável mas não coberto — corrige auto-relato impreciso do @dev sobre "default switch"), 1 INFO nova (ISSUE-4.3-03 magic numbers substring(6,16) acoplados ao Coercionador), 1 LOW herdada (ISSUE-4.2-01 hardening Mapeamento). Nenhuma bloqueia o gate. Story Done; pronta para *close-story 4.3 pelo @po após PR mergeado em main.'
