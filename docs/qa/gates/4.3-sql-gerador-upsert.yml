  notes: 'Posicionamento canônico: ResultadoUpsert e SqlGeradorUpsert em geracao/ (VO de retorno e gerador de SQL) — alinhado com Arquitetura §8 e com o padrão estabelecido por Coercionador/ResultadoCoercao (4.1) e SqlGeradorUpdate/ResultadoUpdate/SqlEscape (4.2). Fluxo.sequenceRespostas em dominio/ (extensão coesa de enum existente, não cria nova classe). SqlGeradorUpsert é função pura no pacote geracao/ — public final class sem CDI, sem dependências de framework (apenas JDK + br.com.arxcode.tematica.geo.{dominio,mapeamento}). Coercionador injetado por parâmetro (não por campo final) — desacopla a fábrica do gerador da do coercionador, padrão consistente com 4.1/4.2. Records imutáveis (ResultadoUpsert) com construtor canônico que normaliza campos via List.copyOf (espelha ResultadoUpdate). SRP: cada classe tem responsabilidade única (ResultadoUpsert transporta resultado; ValorSerializado isola par valor+idAlternativa; SqlGeradorUpsert gera DELETE+INSERT). OCP: SqlGeradorUpsert é fechado para modificação no contrato (Mapeamento, Fluxo, Coercionador estáveis) e aberto para extensão via Story 4.5 (orquestração). Interface Segregation: assinatura única gerar(linha, mapeamento, fluxo, coercionador) — sem overloads. Dependency Inversion: depende de domain stable (Fluxo, Tipo, Mapeamento) e geração 4.1 (Coercionador), não de fontes voláteis. Aderente a CONVENCOES.md (imports absolutos, lowercase package, PT para usuário, sem System.out, Logger não usado por ser função pura), AGENTS.md (regra invariável "respostaterreno/respostasegmento UPSERT por (referencia, idcampo)" — aqui via DELETE+INSERT pois não há UNIQUE INDEX). Marker class para reflexão native-image NÃO necessária (nenhuma das classes novas atravessa fronteira Jackson; ResultadoUpsert é VO interno; ValorSerializado é private record).'

dependent_stories_risk:
  status: LOW
  notes:
    - story: '4.4 (LogErros)'
      risk: 'Baixo — ResultadoUpsert.erros() entrega lista imutável de mensagens PT prontas para escrita no .log. Mesmo padrão de ResultadoUpdate.erros() consumido pela 4.2. ISSUE-4.1-03 (sanitização de control chars) ainda em aberto — se uma célula contiver \\n ou \\r, a mensagem PT virá multi-linha. Não bloqueante.'
    - story: '4.5 (ImportarCommand)'
      risk: 'Baixo — orquestrador instancia SqlGeradorUpsert uma vez (função pura, thread-safe) e compartilha entre iterações. Para cada linha, chamará SqlGeradorUpdate (4.2) + SqlGeradorUpsert (4.3): primeiro gera UPDATE da tabela principal; segundo gera N pares DELETE+INSERT da tabela de respostas. Caso degenerado de 4.3 (sucesso(empty)) NÃO faz a linha sumir do .sql — UPDATE da principal ainda é gerado. Falha de coerção em qualquer dos dois → linha vai inteira ao .log (alinhado a AGENTS.md). Verificar: ordem de emissão UPDATE primeiro vs DELETE+INSERT depois importa para idempotência (DELETE da resposta só após UPDATE da principal? ou independente? — recomendar UPDATE primeiro, depois DELETE+INSERT do bloco de respostas dessa linha).'
    - story: '6.1 (native-image hardening)'
      risk: 'Baixo — nenhuma das 2 classes novas usa reflexão; nenhuma é (de)serializada por Jackson. ValorSerializado é private record (não cruza fronteira). LocalDate/DateTimeFormatter já validados em GraalVM Java 21 (uso da Story 4.1). Não precisam entrar em reflect-config.json (não tocado nesta story, conforme planejado).'
    - story: '4.2.1 (tipagem completa de colunas fixas — futura)'
      risk: 'Sem impacto direto — SqlGeradorUpsert consome tipo real via coluna.tipo() do ColunaDinamica (já tipado desde Story 3.3). A 4.2.1 afeta apenas SqlGeradorUpdate (4.2), não 4.3.'

