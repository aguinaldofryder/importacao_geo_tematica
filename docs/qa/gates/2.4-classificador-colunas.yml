ddd_clean_architecture:
  status: PASS
  notes: 'Pacote mapeamento/ é serviço de domínio puro (Hexagonal/Clean): ClassificadorColunas é função estatélss sem dependências de adapter (não usa CDI, JDBC, fastexcel ou reflexão externa). Entrada 100% por argumento (List<String> + String + Set<String> + bool no construtor) — máximo de testabilidade unitária. Classificacao é Value Object imutável (record + cópias defensivas). Exceções continuam centralizadas em dominio/excecao (vocabulário de erros estável). ColunasFixasConfig é adapter de configuração no pacote config/ (não infiltra a regra de classificação). Decisão explícita de NÃO usar @ApplicationScoped documentada em Dev Notes — alinhada com princípio "domínio não conhece framework". Separação classifier ⊥ config-source permite, no futuro, ler colunasFixasConhecidas de banco/JSON sem mexer no classificador. MapeamentoReflection segue padrão DominioReflection (CONVENCOES.md §Native Image opção b).'

