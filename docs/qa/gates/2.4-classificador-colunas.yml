nfr_validation:
  security:
    status: PASS
    notes: 'Sem dados sensíveis; classificador é função pura sobre List<String>. Exceções não vazam stacktrace ao usuário (ImportacaoException carrega apenas mensagem PT). ColunasFixasConfig só lê propriedades de configuração não-secretas.'
  performance:
    status: PASS
    notes: 'Algoritmo O(N) em headers × O(1) lookup em Set<String>. Para planilhas com até 200 cabeçalhos, latência esperada < 1ms. Stateless permite reuso seguro entre threads sem alocação adicional. Sem benchmark dedicado (não exigido nesta story).'
  reliability:
    status: PASS
    notes: 'Validação fail-fast em 3 camadas: (1) entrada (AC8 — null/empty/blank), (2) duplicatas (AC6 — antes da classificação), (3) ausência de código (AC5 — após varredura). Imutabilidade defensiva no record Classificacao garante que mutações pós-construção são impossíveis. Locale.ROOT elimina classe inteira de bugs de locale (Turkish-i, etc.).'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extensiva em todas as 6 classes novas documenta: contratos, invariantes, precedência, decisões arquiteturais (placeholder em fixas.value, Locale.ROOT, ausência intencional de @ApplicationScoped). Pacote mapeamento/ alinhado com docs/architecture/arquitetura.md §8. Marker MapeamentoReflection segue padrão DominioReflection da Story 2.2 (CONVENCOES.md §Native Image opção b). Pipeline interno em ClassificadorColunas.classificar comentado em 5 etapas explícitas, facilita revisão e evolução.'

top_issues:
  - id: ISSUE-2.4-01
    severity: medium
    status: OPEN
    title: 'AC7 prescreve @WithDefault("") em Set<String>, mas implementação usa Optional<Set<String>> + default method'
    description: 'O texto do AC7 (story 2.4 linha 29 / Tasks T4 linhas 64-69) ainda lê "@WithDefault(\"\") (conjunto vazio)". A implementação real (ColunasFixasConfig.java:36-48) usa getters internos territorialOpt()/predialOpt() retornando Optional<Set<String>> e métodos default territorial()/predial() que delegam para Optional.orElse(Set.of()). Causa raiz: SmallRye Config emite SRCFG00040 ao tentar resolver string vazia para Set<String> (CollectionConverter trata "" como null), o que quebraria o startup do container Quarkus em outros @QuarkusTest. O contrato público observável (assinatura Set<String> territorial()/predial(), retorno vazio quando não configurado) é equivalente ao prescrito, e ColunasFixasConfigDefaultsTest valida exatamente isso. Documentado em Change Log e na seção "Desvio de implementação" da story (linha 183) e no Javadoc da própria interface. Risco residual: texto do AC continua "errado", podendo confundir reviewers futuros e métricas automáticas de aderência. Padrão idêntico ao ISSUE-2.3-01.'
    resolution: 'Sugerido: @sm emenda AC7 (linha 29) e Tasks T4 (linhas 66-67) para "expor Set<String> territorial()/predial() com default vazio (implementado via Optional<Set<String>> internalOpt + default method para contornar SRCFG00040 do SmallRye CollectionConverter)" no momento do *close-story; OR @po aceita formalmente como erratum no fechamento. Não bloqueia gate — semântica observável é equivalente e está testada.'
    refs:
      - 'docs/stories/2.4.classificador-colunas.md:29'
      - 'docs/stories/2.4.classificador-colunas.md:66-67'
      - 'docs/stories/2.4.classificador-colunas.md:183'
      - 'src/main/java/br/com/arxcode/tematica/geo/config/ColunasFixasConfig.java:34-48'
      - 'src/test/java/br/com/arxcode/tematica/geo/config/ColunasFixasConfigDefaultsTest.java'

  - id: ISSUE-2.4-02
    severity: low
    status: OPEN
    title: 'Imports FQN inline em ClassificadorColunas e Classificacao reduzem aderência a CONVENCOES.md §Imports'
    description: 'CONVENCOES.md §Imports prescreve "um import por linha". ClassificadorColunas.java usa nomes totalmente qualificados inline em vez de imports declarados em pelo menos 4 pontos: linha 73 (java.util.List<String> headers no parâmetro), linha 89 (new java.util.LinkedHashMap<>()), linha 111 (java.util.List<String> dinamicas, new java.util.ArrayList<>()). Classificacao.java tem o mesmo padrão na linha 50 (java.util.Collections.unmodifiableMap). Funcionalmente correto e sem warning de compilação, mas cria assimetria interna (LinkedHashMap, Locale, Map, Set já são importados no topo de ClassificadorColunas) e prejudica grep/refactor. Em ClassificadorColunasTest.java, o mesmo ocorre nas linhas 131-143 com org.junit.jupiter.params.provider.Arguments inline.'
    resolution: 'Refactor trivial: adicionar imports declarados de java.util.List, java.util.ArrayList e java.util.Collections em ClassificadorColunas/Classificacao, e org.junit.jupiter.params.provider.Arguments no teste. Pode ser feito junto com qualquer story futura que toque esses arquivos (ex.: 3.4 ao fazer wiring do classificador) ou como housekeeping isolado. Não bloqueia gate.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/ClassificadorColunas.java:73'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/ClassificadorColunas.java:89'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/ClassificadorColunas.java:111'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/Classificacao.java:50'
      - 'src/test/java/br/com/arxcode/tematica/geo/mapeamento/ClassificadorColunasTest.java:131-143'

  - id: ISSUE-2.4-03
    severity: low
    status: OPEN
    title: 'Classificacao usa LinkedHashMap+Collections.unmodifiableMap em vez do Map.copyOf prescrito em T1 — desvio benéfico não anotado'
    description: 'A Task T1 (story linha 42) prescreve "Reatribuir fixas = Map.copyOf(fixas) e dinamicas = List.copyOf(dinamicas) para garantir imutabilidade (cópias defensivas)". A implementação real (Classificacao.java:50) usa fixas = Collections.unmodifiableMap(new LinkedHashMap<>(fixas)) — escolha tecnicamente SUPERIOR porque Map.copyOf retorna uma implementação que NÃO garante ordem de iteração (preservada em Java 21 atual mas não contratualmente), enquanto LinkedHashMap+unmodifiable garante ordem AC1 conforme prescrito. dinamicas mantém List.copyOf como prescrito (List.copyOf preserva ordem por contrato). Trade-off: novo objeto LinkedHashMap aloca um pouco mais que ImmutableCollections.MapN, custo desprezível. Risco residual: divergência texto-da-task vs código pode confundir auditoria.'
    resolution: 'Sugerido: @sm emenda T1 (linha 42) substituindo "Map.copyOf(fixas)" por "Collections.unmodifiableMap(new LinkedHashMap<>(fixas)) — escolhido em vez de Map.copyOf para garantir contratualmente a ordem de iteração exigida pelo AC1" no *close-story. Não bloqueia gate.'
    refs:
      - 'docs/stories/2.4.classificador-colunas.md:42'
      - 'src/main/java/br/com/arxcode/tematica/geo/mapeamento/Classificacao.java:49-51'

  - id: ISSUE-2.4-04
    severity: info
    status: INFO
    title: 'CabecalhoDuplicadoException usa "vezes" mesmo para count=2 (gramaticalmente "vezes" é OK em PT, mas formato "X aparece N vezes" deveria ser "X aparece N vez(es)")'
    description: 'A mensagem formatada por CabecalhoDuplicadoException.formatar (linha 26) escreve "''X'' aparece N vezes". Para N=2 está correto em PT ("aparece 2 vezes"). Não há cenário N=1 (filtrado em ClassificadorColunas.java:95 — só duplicatas com count>1 chegam aqui), portanto não há bug funcional. Apenas registro: o exemplo do AC6 (linha 28 da story) mostra exatamente "aparece 2 vezes", então está conforme. Sem ação.'
    resolution: 'Nenhuma. Registrado apenas para completude da auditoria.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/dominio/excecao/CabecalhoDuplicadoException.java:24-28'
      - 'docs/stories/2.4.classificador-colunas.md:28'

