  status: LOW
  notes:
    - story: '3.2 (auto-mapeador)'
      risk: 'Baixo — Classificacao expõe slots codigo/fixas/dinamicas estáveis e imutáveis. Slot fixas com value=header (placeholder) está explicitamente documentado em Javadoc (Classificacao.java:24-30) e em Dev Notes da própria 2.4 — Story 3.2 sabe que precisa resolver o value para o nome físico da coluna na tabela principal (consultando INFORMATION_SCHEMA ou catálogo estático). Acoplamento mínimo: 3.2 lê o record, não modifica.'
    - story: '3.4 (comando mapear / orquestração + export JSON)'
      risk: 'Baixo — wiring trivial: new ClassificadorColunas(config.mapeamento().caseSensitive(), config.mapeamento().trimEspacos()) + escolha do Set entre config.territorial() e config.predial() conforme Fluxo. ColunasFixasConfig.territorial()/predial() já estão no contrato público com defaults vazios. Classificacao registrada em MapeamentoReflection garante serialização Jackson em native-image sem anotações extras (AC12 verificado). Único ponto de atenção: 3.4 deve diferenciar catch (ColunaCodigoAusenteException vs CabecalhoDuplicadoException vs ImportacaoException) para emitir exit codes distintos conforme Arquitetura §7.3 — base para isso já está pronta (subtipos específicos).'
    - story: '6.1 (native-image hardening)'
      risk: 'Baixo — MapeamentoReflection já registrado. ClassificadorColunas e exceções não usam reflexão. Sem campos estáticos mutáveis. Construtor público sem @Inject (não exige beans-config para CDI). Único ponto a verificar em 6.1: que Optional<Set<String>> em ConfigMapping interface não exige reflect-config adicional (provavelmente já coberto pelo SmallRye Config build steps).'
    - story: '6.4 (manual operador / application.properties.exemplo)'
      risk: 'Baixo — chaves importacao.colunas-fixas.territorial e importacao.colunas-fixas.predial documentadas em Javadoc da ColunasFixasConfig (linhas 13-17). Story 6.4 só precisa replicar no exemplo.'

