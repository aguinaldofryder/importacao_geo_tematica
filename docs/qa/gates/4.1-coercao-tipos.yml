ddd_clean_architecture:
  status: PASS
  notes: 'Coercionador é função pura no pacote geracao/ — alinhado com Arquitetura §8 (camada de geração separada de excel/, mapeamento/, dominio/). Sem CDI, sem dependências de framework (apenas JDK + br.com.arxcode.tematica.geo.dominio.Tipo). ResultadoCoercao é Value Object imutável (record) sem comportamento — apenas dados de retorno. Construtor canônico valida invariantes (fail-fast). Sem regra de negócio do IPTU vazando aqui — apenas conversão sintática. Single Responsibility: cada branch do switch tem um método privado dedicado. Open/Closed: switch exhaustivo força revisitar esta classe ao adicionar novo Tipo (decisão consciente — coerção é centro nervoso da geração SQL, não deve aceitar extensão silenciosa). Interface Segregation: assinatura única coagir(valor, tipo, alternativas) — alternativas pode ser null para tipos != MULTIPLA_ESCOLHA, decisão pragmática vs. múltiplos métodos overloaded. Aderente a CONVENCOES.md (imports absolutos, lowercase package, PT para usuário, sem System.out, Logger não usado por ser função pura). Marker class para reflexão native-image NÃO necessária (Coercionador não atravessa fronteira Jackson; record ResultadoCoercao tampouco — não é (de)serializado).'

