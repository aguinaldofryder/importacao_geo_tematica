nfr_validation:
  security:
    status: PASS
    notes: 'Foco crítico desta story (CON-03 — sem PreparedStatement). TEXTO escapa "/" → "/" para PostgreSQL standard_conforming_strings=on (default ≥9.1) — testado com input emblemático "O''Brien" e tentativa explícita de injection "/; DROP TABLE x; --" produzindo string inerte com asserção adicional de aspas balanceadas. MULTIPLA_ESCOLHA emite literal numérico apenas via String.valueOf(Integer) após match no catálogo — impossível injetar (testado com "1; DROP" caindo em "alternativa não mapeada"). DATA emite "DATE ''yyyy-MM-dd''" após parse STRICT — impossível injetar. DECIMAL emite BigDecimal.toPlainString após validação por regex restritiva — impossível injetar. Vetores cobertos. Resíduo: comportamento sob standard_conforming_strings=off (não-default) requer prefixo E para escapar backslash; assumido on conforme Dev Notes (registrado como risco arquitetural na própria story).'
  performance:
    status: PASS
    notes: 'Função pura síncrona. Constantes pré-compiladas (DECIMAL_CANONICO Pattern, DATA_PT_BR/DATA_ISO DateTimeFormatter) evitam recompilação por chamada. BigDecimal cria instância por valor decimal — alocação O(1), aceitável para volume IPTU (centenas de milhares de células). Iteração linear O(n) sobre alternativas (n ≤ ~10 tipicamente para enum-like) — aceitável; HashMap.get não usado porque normalização case-insensitive+trim aplica-se à chave do mapa também. Sem caching mutável (alinhado a AC8 thread-safety). Não há perf hot-path identificado para Story 4.5 (importar) — Stories 4.2/4.3 chamam por célula × linha, mas overhead de coerção é desprezível vs. I/O do .sql. Sem riscos.'
  reliability:
    status: PASS
    notes: 'Tratamento de erro como dado (ResultadoCoercao.falha) em vez de exceção evita propagação custosa por linha — alinhado a PRD FR-13. Switch exhaustivo Java 21 sem default garante que adição futura ao enum Tipo causa erro de compilação (fail-fast). DateTimeFormatter STRICT + uuuu rejeita corretamente datas inexistentes (31/02, 29/02 não-bissexto) — diferencial técnico crítico documentado em Dev Notes. Defesa em profundidade contra Map<String,Integer> com value=null cobre cenário real de AutoMapeador.java:213 com mensagem distinta de "não mapeada", facilitando diagnóstico no .log da Story 4.4. Construtor canônico do record valida invariantes (ok=true exige literalSql; ok=false exige erro). Função pura sem efeitos colaterais — reproducibilidade absoluta. Imutabilidade dos records garante segurança em paralelismo futuro caso Stories 4.2/4.3 paralelizem geração.'
  maintainability:
    status: PASS
    notes: 'Javadoc PT extensivo na classe principal e no record documenta: contratos, decisões arquiteturais (literal vs PreparedStatement, função pura sem CDI, locale fixo, política de erro como dado), referências às Stories que consomem (4.2/4.3) e que loga (4.4), invariantes do construtor canônico do record. Branches por tipo separados em métodos privados nomeados (coagirTexto/Decimal/Data/MultiplaEscolha) — escopo cognitivo isolado. Constantes nomeadas com semântica explícita (NULL_LITERAL, DECIMAL_CANONICO, DATA_PT_BR, DATA_ISO). Helpers (escaparAspas, mensagemDataInvalida) com Javadoc. Testes organizados em @Nested por AC com nomes descritivos snake_case_underscores em pt — facilita navegação. Sem AssertJ (alinhado ao padrão Story 3.1) mas helpers assertOk/assertFalha eliminam boilerplate. Sem dívida técnica detectada além das LOW issues registradas.'

top_issues:
  - id: ISSUE-4.1-01
    severity: low
    status: OPEN
    title: 'Typo no AC9 da story diverge do esperado real produzido pela implementação correta'
    description: 'AC9 prescreve literalmente: "(b) `\"; DROP TABLE x; --\"` produz `\"\";\" DROP TABLE x; --\"` (texto inerte)". O segundo literal contém uma sequência apóstrofo-vírgula-apóstrofo que não corresponde ao output real do escape correto. A implementação produz `"";" DROP TABLE x; --"` (apóstrofo de abertura + 2 apóstrofos escapando o `'` original + ponto-e-vírgula + restante + apóstrofo de fechamento), e o teste tentativaInjectionEmTexto_neutralizada assertou exatamente esse valor — que está correto. O AC tem typo de documentação, não a implementação. Fora do escopo desta story modificar o AC (story Done), mas registrar para evitar confusão em futura auditoria.'
    suggested_owner: po
    resolution: 'Em uma futura revisão de stories ou changelog, corrigir a string esperada no AC9 (b) para refletir o output correto do escape PostgreSQL. Alternativamente, anexar nota no Change Log indicando que o teste é a fonte de verdade.'
    refs:
      - 'docs/stories/4.1.coercao-tipos.md:31'
      - 'src/test/java/br/com/arxcode/tematica/geo/geracao/CoercionadorTest.java:251-262'

  - id: ISSUE-4.1-02
    severity: low
    status: OPEN
    title: 'escaparAspas privada — Stories 4.2/4.3 precisarão do mesmo escape ao montar cláusulas WHERE'
    description: 'O método private static String escaparAspas(String s) (linha 163) é o coração da defesa CON-03. Quando SqlGeradorUpdate (Story 4.2) montar `WHERE col = ''<idkey escapado>''` ou SqlGeradorUpsert (4.3) montar `INSERT ... VALUES (''<referencia escapada>'', ...)`, o mesmo escape será necessário. Hoje seria duplicado em outra classe. Já registrado pelo @dev nas Completion Notes como "deferido". Risco de regressão: dois pontos de escape divergirem no futuro (ex.: alguém adicionar prefixo E em uma cópia mas não na outra). Sem ação imediata pois Stories 4.2/4.3 ainda não existem — decisão correta de não criar abstração prematura.'
    suggested_owner: dev
    resolution: 'Quando Story 4.2 (SqlGeradorUpdate) for implementada: extrair escaparAspas para classe utilitária pública (ex.: SqlEscape.literalTexto(String)) compartilhada por Coercionador e SqlGerador*. Atualizar testes em conformidade. Pode ser feito como refactor da própria 4.2.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/Coercionador.java:163-165'

  - id: ISSUE-4.1-03
    severity: low
    status: RESOLVED
    resolved_in: '4.4'
    resolved_at: '2026-05-03T15:42:00-03:00'
    resolved_by: 'Quinn (Test Architect — Sage @qa) na review da Story 4.4'
    title: 'Mensagens de falha interpolam valor cru — input com newline/CR pode quebrar legibilidade do .log'
    description: 'As 4 mensagens de falha (decimal/data/alternativa não mapeada/mapeamento corrompido) interpolam o input cru via `"valor ''" + valor + "''..."`. Se uma célula do Excel contiver \\n, \\r ou caracteres de controle, a mensagem PT virá multi-linha no .log da Story 4.4 — afetando parsing de logs por linha (cenário improvável em IPTU mas possível em campos TEXTO mal preenchidos). Não é vulnerabilidade. Trade-off: sanitizar ofusca o problema real ao operador. Decisão razoável manter como está, mas registrar para Story 4.4 (LogErros) considerar formatador de mensagem que escape control chars na escrita do .log.'
    suggested_owner: dev
    resolution: 'FECHADA na Story 4.4 conforme planejado. Helper privado LogErros.sanitizar(String) (LogErros.java:288-335) aplica escape char-a-char em todos os campos de input externo antes da renderização (codigoImovel, motivo, coluna, valorOriginal, mensagens de erros agregados, nomePlanilha): \\n/\\r/\\t → \\\\n/\\\\r/\\\\t literais; demais control chars < 0x20 → \\\\uXXXX em hex maiúsculo de 4 dígitos. Coercionador permanece intacto (mensagem PT pura preservada para outros consumidores potenciais), conforme decisão original. Verificação ponta-a-ponta em SmokeLogInjection.vetorMaliciosoNaoQuebraEstrutura (LogErrosTest.java:478-501): vetor com \\n/\\r + tentativa de forjar [linha 999] codigo=HACK produz exatamente 13 newlines estruturais (4 cabeçalho + 3 seção coerção + 6 sumário) e nenhuma entrada injetada. Cobertura JaCoCo do helper sanitizar: 100%/100% (45/45 instruções, 13/13 branches) com 12 testes diretos via sanitizarParaTeste package-private. Ver detalhes completos em docs/qa/gates/4.4-log-erros-estruturado.yml#ISSUE-4.1-03.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/Coercionador.java:109,124,130,147,152,167-169'
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/LogErros.java:288-335 (sanitização — fechamento)'
      - 'src/test/java/br/com/arxcode/tematica/geo/geracao/LogErrosTest.java:95-161,475-502 (cobertura)'
      - 'docs/qa/gates/4.4-log-erros-estruturado.yml (cross-link de fechamento)'

  - id: ISSUE-4.1-04
    severity: info
    status: INFO
    title: 'Conjuntos de inválidos em DECIMAL/DATA não cobrem variantes de whitespace interno e negativo sem inteiro'
    description: 'Casos não exercitados (todos comportam-se corretamente — verificado por raciocínio sobre regex/formatter, não bug): (a) "-,5" em DECIMAL — normaliza para "-.5" → regex falha → falha PT (correto); (b) " 01/01/2025 " com espaços externos em DATA — trim já aplicado em coagirData, ok (já garantido pelo guard de AC3 + trim adicional dentro do método); (c) "01 /01/2025" com espaço interno em DATA — DateTimeParseException → falha PT (correto). Cobertura de linhas/branches já é 100%, então adicionar não muda métrica — apenas amplia documentação executável. Risco mínimo.'
    suggested_owner: dev
    resolution: 'Opcional. Adicionar 3 casos ao @ValueSource de Decimal e Data inválidos quando houver outra alteração na classe. Não justifica iteração isolada.'
    refs:
      - 'src/test/java/br/com/arxcode/tematica/geo/geracao/CoercionadorTest.java:124-141,161-176'

  - id: ISSUE-4.1-05
    severity: info
    status: INFO
    title: 'Iteração O(n) em MULTIPLA_ESCOLHA é ótima hoje mas merece revisão se enum tiver dezenas de alternativas'
    description: 'O loop em coagirMultiplaEscolha (linha 139) é linear sobre alternativas.entrySet() porque a normalização case-insensitive + trim aplica-se também à chave do mapa (HashMap.get(chave) seria case-sensitive). Para n ≤ 10 (típico em campos enum-like de IPTU: Sim/Não, faixas de uso, categorias), isso é desprezível. Se algum campo crescer para n ≥ 50, vale considerar pre-computar Map<String, Integer> com chaves já normalizadas no AutoMapeador (Story 3.2) ou no MapeamentoStore (3.1), permitindo HashMap.get O(1) aqui. Sem ação agora.'
    suggested_owner: dev
    resolution: 'Sem ação. Monitorar métricas de runtime quando Story 4.5 (importar) gerar volume real. Se aparecer hotspot, mover normalização para o produtor do Map (3.1/3.2) e simplificar Coercionador para HashMap.get.'
    refs:
      - 'src/main/java/br/com/arxcode/tematica/geo/geracao/Coercionador.java:139-151'

