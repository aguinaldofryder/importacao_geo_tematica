      risk: 'Baixo — consumirá Coercionador.coagir(valor, tipo, alternativas) por célula da planilha; assinatura estável. Atenção ao ISSUE-4.1-02: extrair escaparAspas para classe utilitária compartilhada (SqlEscape) ao montar WHERE. Política de erro (ResultadoCoercao.falha) já está pronta para alimentar 4.4.'
    - story: '4.3 (SqlGeradorUpsert)'
      risk: 'Baixo — mesmo contrato que 4.2. Para INSERT em respostaterreno/respostasegmento, valor da resposta + idcampo + idalternativa (em multipla escolha) já saem prontos para concatenação. Sem riscos identificados.'
    - story: '4.4 (LogErros)'
      risk: 'Baixo-Médio — atenção ao ISSUE-4.1-03: aplicar sanitização de control chars (\\r\\n\\t) ao escrever no .log para evitar quebra de linha em mensagens de erro com valor cru contendo newline. Coercionador entrega mensagem PT pura (intencional); transformação visual é responsabilidade do escritor do log.'
    - story: '4.5 (ImportarCommand)'
      risk: 'Baixo — orquestrador instancia Coercionador uma vez (AC8 thread-safe) e compartilha entre iterações. Falhas de coerção interrompem processamento da linha (PRD FR-13) sem abortar pipeline. Verificar: contagem de linhas com erro deve ser exibida no resumo final.'
    - story: '6.1 (native-image hardening)'
      risk: 'Baixo — Coercionador não usa reflexão (switch exhaustivo, regex pré-compilado, DateTimeFormatter constante). ResultadoCoercao não atravessa fronteira Jackson. Não precisa entrar em reflect-config.json. Confirmar no smoke nativo da 6.3 que coerção funciona em binário (especialmente DATA com STRICT — comportamento de DateTimeFormatter em GraalVM é estável em Java 21).'

